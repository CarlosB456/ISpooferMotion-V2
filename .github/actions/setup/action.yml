name: 'Setup Environment'
description: 'Setups bun, rust, and tauri dependencies'
inputs:
  os:
    description: 'OS running the action'
    required: false
    default: 'linux'
runs:
  using: 'composite'
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Setup Rust (macOS universal)
      if: contains(inputs.os, 'macos')
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-apple-darwin, x86_64-apple-darwin
        components: rustfmt, clippy

    - name: Setup Rust (Linux)
      if: contains(inputs.os, 'linux')
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-unknown-linux-gnu
        components: rustfmt, clippy

    - name: Setup Rust (Windows)
      if: contains(inputs.os, 'windows')
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc
        components: rustfmt, clippy

    - name: Setup Rust (default, no os provided)
      if: ${{ !contains(inputs.os, 'macos') && !contains(inputs.os, 'linux') && !contains(inputs.os, 'windows') }}
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: src-tauri
        cache-on-failure: true

    - name: install Tauri Linux dependencies
      if: contains(inputs.os, 'linux')
      run: |
        sudo apt-get update
        sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      shell: bash

    - name: Install dependencies
      run: bun install --frozen-lockfile
      shell: bash
