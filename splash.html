<!doctype html>
<html
  lang="en"
  class="dark"
  style="background-color: transparent !important; background: transparent !important"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Updater</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="image" href="/src-tauri/icons/128x128.png" fetchpriority="high" />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/index.css" />
    <style>
      body {
        font-family: 'Geist', sans-serif;
        margin: 0;
        overflow: hidden;
      }

      .drag-region {
        -webkit-app-region: drag;
      }

      .spinner {
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        border-top: 3px solid #ffffff;
        width: 24px;
        height: 24px;
      }
    </style>
  </head>

  <body
    style="background-color: transparent !important"
    class="text-white h-screen overflow-hidden m-0 p-0"
  >
    <div
      style="background-color: #111113"
      class="w-full h-full rounded-2xl border border-white/10 shadow-2xl flex flex-col items-center justify-center drag-region overflow-hidden box-border"
    >
      <div class="flex flex-col items-center justify-center space-y-4">
        <img
          src="/src-tauri/icons/128x128.png"
          alt="ISpooferMotion"
          class="w-24 h-24 drop-shadow-xl"
          fetchpriority="high"
        />
        <h1 class="text-xl font-bold tracking-tight">ISpooferMotion</h1>
        <div class="flex items-center space-x-3 text-sm text-gray-400">
          <div class="spinner animate-spin" id="spinner"></div>
          <span id="status-text">Checking for updates...</span>
        </div>
        <div
          id="update-actions"
          class="flex items-center space-x-3"
          style="display: none; margin-top: 1rem"
        >
          <button
            id="btn-skip"
            class="px-4 py-2 text-sm font-medium text-gray-300 hover:text-white transition-colors bg-white/5 hover:bg-white/10 rounded-md outline-none cursor-pointer"
            style="-webkit-app-region: no-drag"
          >
            Skip
          </button>
          <button
            id="btn-download"
            class="px-4 py-2 text-sm font-medium text-black bg-[#a7f3d0] hover:bg-[#86efac] transition-colors rounded-md shadow-[0_0_15px_rgba(167,243,208,0.3)] outline-none cursor-pointer"
            style="-webkit-app-region: no-drag"
          >
            Download
          </button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/splash.ts"></script>
  </body>
</html>
